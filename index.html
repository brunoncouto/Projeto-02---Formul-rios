<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda o seu Carro!</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>Cadastre seu carro para vender mais rápido!</h3>
        </div>
            <div class="form-container">
                <div class="form-header">
                    <p>Formulário</p>
                </div>
                <div class="form-body">
                    <h1 class="form-title">Venda fácil o seu carro!</h1>
                    <p>Descreva as características e marque os opcionais que ele possui</p>
                    <form action="">
                        <div class="box-input">
                            <label for="title">Título do meu anúncio <span class="required-field">*</span></label>
                            <input type="text"
                                name="title"
                                id="title"
                                class="block"
                                placeholder="Um título para anunciar o seu carro!"
                                minlength="1"
                                maxlength="30"
                                required
                            />
                        </div>
                         <div class="box-input">
                            <label for="price">
                                Preço<span class="required-field">*</span></label>
                            <input type="number"
                                name="price"
                                id="price"
                                class="block"
                                placeholder="Defina o preço"
                                required
                            />
                        </div>
                        <div class="box-input">
                            <label for="description">Descrição <span class="required-field">*</span></label>
                            <textarea 
                            name="description"
                            id="description"
                            class="block"
                            placeholder="Descreva o seu carro">
                            </textarea>
                        </div>
                        <div class="box-input">
                            <label for="brand">
                                Marca<span class="required-field">*</span></label>
                            <input 
                                type="text"
                                name="brand"
                                id="brand"
                                class="block"
                                placeholder="Digite a marca do carro."
                                required
                            />
                        </div>
                        <div class="box-input">
                            <label for="model">
                                Modelo<span class="required-field">*</span></label>
                            <input 
                                type="text"
                                name="model"
                                id="model"
                                class="block"
                                placeholder="Digite o modelo do carro"
                                required
                            />
                        </div>
                            <div class="box-input">
                            <label for="mile">
                                Kilometragem<span class="required-field">*</span></label>
                            <input 
                                type="number"
                                name="mile"
                                id="mile"
                                class="block"
                                placeholder="Defina o km do veículo"
                                required
                            />
                        </div>
                        <div class="box-input">
                            <label for="purchasedate">
                                Data da compra<span class="required-field">*</span></label>
                            <input 
                                type="date"
                                name="purchasedate"
                                id="purchasedate"
                                class="block"
                                required
                            />
                        </div>
                        <div class="box-input">
                            <p>Tipo de câmbio</p>
                            <input type="radio" id="manual" name="gear"/>
                            <label for="manual">Manual</label>
                            <input type="radio" id="automatico" name="gear"/>
                            <label for="automatico">Automático</label>
                        </div>
                        <div class="optional-box">
                            <p>Opcionais</p>
                            <ul class="optional-list">
                                <li>
                                    <input type="checkbox" name="optional[]" id="airbag" value="airbag">
                                    <label for="airbag">Airbag</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="alarm" value="alarm">
                                    <label for="alarm">Alarme</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="AC" value="AC">
                                    <label for="AC">Ar Condicionado</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="reverse_camera" value="reverse_camera">
                                    <label for="reverse_camera">Câmera de ré</label>
                                </li>
                            </ul>
                        </div>
                        <div class="optional-box">
                            <ul class="optional-list">
                                <li>
                                    <input type="checkbox" name="optional[]" id="lane_assist" value="lane_assist">
                                    <label for="lane_assist">Assistente de pista</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="key_less" value="key_less">
                                    <label for="key_less">Partida sem chave</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="smartphone" value="smartphone">
                                    <label for="smartphone">Integração com celular</label>
                                </li>
                                <li>
                                    <input type="checkbox" name="optional[]" id="leather_sit" value="leather_sit">
                                    <label for="leather_sit">Banco de couro</label>
                                </li>
                            </ul>
                        </div>
                        <div class="box-input">
                            <p>Fotos do carro <span class="required-field">*</span></p>
                            <input type="file" 
                            multiple
                            accept="image/png, image/jpg"
                            id="images"
                            name="images"
                            required
                            />

                        </div>
                        <input type="submit" value="Enviar" class="btn-submit">
                    </form>
            </div>
        </div>
    </div>
</body>
</html>
